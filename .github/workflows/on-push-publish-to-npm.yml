name: on-push-publish-to-npm
on:
  push:
    branches:
      - 'main'
    paths:
      - 'package.json'

permissions:
  contents: read  # Required for OIDC
  id-token: write

jobs:
  publish:
    if: github.repository == 'adobe/aio-cli-plugin-aem-edge-functions'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: npm test
      - name: Publish to NPM
        uses: JS-DevTools/npm-publish@v4.1.5
        id: publish
      - name: Check if version changed
        if: ${{ steps.publish.outputs.type }}
        run: echo "Version changed!"
